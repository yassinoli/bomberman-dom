<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./index.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #root {
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 0;
        background-color: azure;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }
      .main-container {
        width: 1050px;
        min-width: 1050px;
        max-width: 1050px;
        height: 750px;
        min-height: 750px;
        max-height: 750px;
        background-color: aqua;
      }
      .lives-and-score-container {
        width: 100%;
        height: 100px;
        background-color: blue;
      }
      .game-container {
        width: 100%;
        height: 650px;
        background-color: aquamarine;
      }
      .messages-container {
        width: 450px;
        height: 750px;
        background-color: aqua;
      }
      .border-line {
        width: 100%;
        height: 100%;
        background-color: red;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .map-game {
        width: 950px;
        height: 550px;
        background-color: black;
        display: flex;
        flex-wrap: wrap;
        gap: 1px;
      }
      .cube {
        width: 49px;
        height: 49px;
        background-color: green;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cant-be-broken {
        background-color: black !important;
      }
      .empty-space {
        background-color: rgb(0, 140, 255) !important;
      }
    </style>
  </head>
  <body id="body">
    <div id="root">
      <div class="main-container">
        <div class="lives-and-score-container">dd</div>
        <div class="game-container">
          <div class="border-line">
            <div class="map-game" id="map-game"></div>
          </div>
        </div>
      </div>
      <div class="messages-container"></div>
    </div>
    <script>
      const cantBeBroken = [
        20, 22, 24, 26, 28, 30, 32, 34, 36, 58, 60, 62, 64, 66, 68, 70, 72, 74, 96, 98, 100, 102, 104, 106, 108, 110, 112, 134, 136, 138, 140, 142, 144, 146, 148, 150, 172, 174, 176, 178, 180, 182,
        184, 186, 188,
      ];
      const emptySpaces = [0, 1, 17, 18, 19, 37, 171, 189, 190, 191, 207, 208];
      function generateMapCubes() {
        const container = document.getElementById("");
        for (let i = 0; i < 209; i++) {
          if (contain(cantBeBroken, i)) {
            document.getElementById("map-game").innerHTML += `
                  <div id="cube-${i}" class="cube cant-be-broken"></div>
              `;
          } else if (contain(emptySpaces, i)) {
            document.getElementById("map-game").innerHTML += `
                  <div id="cube-${i}" class="cube empty-space"></div>
              `;
          } else {
            document.getElementById("map-game").innerHTML += `
                  <div id="cube-${i}" class="cube"></div>
              `;
          }
        }
      }

      generateMapCubes();

      function contain(a, e) {
        for (let i = 0; i < a.length; i++) {
          if (a[i] == e) {
            return true;
          }
        }
        return false;
      }

      function generateObstacles() {
        let count = 0;
        while (count < 100) {
          let randomNumber = Math.ceil(Math.random() * 208);
          if (!contain(cantBeBroken, randomNumber) && !contain(emptySpaces, randomNumber)) {
            document.getElementById(`cube-${randomNumber}`).innerHTML = "full";
            count++;
          }
        }
      }
      generateObstacles();
    </script>
    <!-- <script type="module" src="./index.mjs"></script> -->
  </body>
</html>
